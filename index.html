<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Video Downloader</title>
    <style>
        /* Desain Manual Clean & Ringan */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #0f172a; color: #f8fafc; display: flex; align-items: center; justify-content: center; height: 100vh; padding: 20px; }
        .card { width: 100%; max-width: 400px; background-color: #1e293b; padding: 24px; border-radius: 16px; border: 1px solid #334155; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        h1 { color: #c084fc; font-size: 24px; margin-bottom: 8px; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 24px; }
        input { width: 100%; padding: 14px; background: #0f172a; border: 1px solid #475569; border-radius: 12px; color: white; margin-bottom: 14px; font-size: 14px; outline: none; }
        input:focus { border-color: #a855f7; }
        .btn-main { width: 100%; background: #9333ea; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-main:hover { background: #a855f7; }
        .btn-main:disabled { background: #475569; cursor: not-allowed; }
        #loadingStatus { color: #c084fc; font-weight: 500; margin-top: 16px; font-size: 14px; }
        #resultArea { margin-top: 24px; border-top: 1px solid #334155; padding-top: 24px; }
        .success-text { color: #4ade80; font-weight: 500; margin-bottom: 12px; }
        .box-result { background: #0f172a; padding: 16px; border-radius: 12px; display: flex; flex-direction: column; align-items: center; }
        img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; }
        #videoTitle { font-size: 14px; color: #cbd5e1; text-align: left; width: 100%; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .btn-green { display: block; width: 100%; background: #16a34a; color: white; text-decoration: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: bold; text-align: center; }
        .btn-green:hover { background: #22c55e; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="card">
        <h1>TikTok Downloader</h1>
        <p class="subtitle">Unduh video TikTok tanpa watermark secara gratis</p>
        
        <!-- Input Box -->
        <input type="text" id="videoUrl" placeholder="Tempel tautan video TikTok di sini...">
        <button id="btnDownload" onclick="startDownloadProcess()" class="btn-main">Gas Download!</button>

        <!-- Status Loading -->
        <div id="loadingStatus" class="hidden">Sedang memproses video, tunggu bentar... 🚀</div>

        <!-- Hasil -->
        <div id="resultArea" class="hidden">
            <p class="success-text">Video Berhasil Ditemukan! 🎉</p>
            <div class="box-result">
                <img id="videoPreview" src="" alt="Preview" class="hidden">
                <p id="videoTitle">Judul video akan muncul di sini</p>
                <a id="downloadLink" href="#" target="_blank" rel="noopener noreferrer" class="btn-green">Unduh Tanpa Watermark</a>
            </div>
        </div>
    </div>

    <script>
        async function startDownloadProcess() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const btnDownload = document.getElementById('btnDownload');
            const loadingStatus = document.getElementById('loadingStatus');
            const resultArea = document.getElementById('resultArea');
            
            if(!urlInput) {
                alert('Tolong masukkan link TikTok-nya dulu ya!');
                return;
            }

            // Atur UI saat loading
            btnDownload.disabled = true;
            btnDownload.innerText = "Memproses...";
            loadingStatus.classList.remove('hidden');
            resultArea.classList.add('hidden');

            try {
                // Tembak API TikWM khusus TikTok
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const data = await res.json();

                if (data.code === 0 && data.data) {
                    const videoData = data.data;

                    // Set judul video
                    document.getElementById('videoTitle').innerText = videoData.title || "Video tanpa judul";
                    
                    // Set preview gambar sampul video
                    const previewImg = document.getElementById('videoPreview');
                    if(videoData.cover) {
                        previewImg.src = videoData.cover;
                        previewImg.classList.remove('hidden');
                    } else {
                        previewImg.classList.add('hidden');
                    }

                    // Set link tombol download (Video tanpa watermark)
                    document.getElementById('downloadLink').href = `https://www.tikwm.com${videoData.play}`;

                    // Munculkan area hasil
                    resultArea.classList.remove('hidden');
                } else {
                    alert('Gagal mengambil video. Pastikan link TikTok yang kamu masukkan valid!');
                }
            } catch (error) {
                alert('Terjadi kesalahan koneksi. Coba lagi beberapa saat lagi.');
            } finally {
                // Kembalikan tombol ke semula
                btnDownload.disabled = false;
                btnDownload.innerText = "Gas Download!";
                loadingStatus.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
